<!--
  Chromeless noVNC viewer for River's live browser view.

  This page intentionally renders NO in-iframe chrome — no status bar, no
  "Disconnected" pill, no toolbar. Connection state is reported to the
  embedding window via `postMessage({type:"novnc:state", ...})` so the React
  side panel can paint its own inactive / reconnecting placeholder. The
  iframe stays mounted across reconnect attempts so the React parent does
  not need to remount us.

  Posted message payloads (always include `type: "novnc:state"`):
    { state: "connecting", attempt }
    { state: "connected" }
    { state: "reconnecting", attempt, delayMs, reason }
    { state: "disconnected", reason }         — gave up
    { state: "auth_required" }
    { state: "security_failure", reason }

  Query params we honor (set by backend `_build_live_view_url`):
    autoconnect=true        — ignored (always autoconnect)
    resize=remote|scale|off — `remote` → RFB ExtendedDesktopSize (Xvfb
                              resizes to viewport); `scale` → CSS scale
                              (default in product because Chrome doesn't
                              respond to X RandR); `off` → native pixels
    view_only=true          — client-side view-only, defense-in-depth
                              alongside the iframe `sandbox` attribute
    path=<ws-path>          — websockify path (default `websockify`)
    password=<pw>           — optional VNC password
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0d;
    }
    #screen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #screen canvas { display: block; }
  </style>
</head>
<body>
  <div id="screen"></div>
  <script type="module">
    import RFB from './core/rfb.js';

    const params = new URL(window.location.href).searchParams;
    const screenEl = document.getElementById('screen');
    const resize = params.get('resize') || 'scale';
    const viewOnly = params.get('view_only') === 'true';
    const password = params.get('password') || '';

    // Auto-reconnect with exponential backoff. The WebSocket between noVNC
    // and Daytona's edge proxy occasionally blips (iframe re-layout,
    // Daytona edge restart, brief sandbox idle). Without a reconnect loop
    // the viewer would lock into a "Disconnected" state until the user
    // refreshes — which is confusing for a panel that always claims to be
    // live. We cap at MAX_ATTEMPTS and then post a terminal `disconnected`
    // state so the React parent can offer a manual retry. The attempt
    // counter resets on a successful `connect` event.
    let rfb = null;
    let attempt = 0;
    let backoffTimer = null;
    const MAX_ATTEMPTS = 10;
    const BASE_DELAY_MS = 500;
    const MAX_DELAY_MS = 8000;

    function postState(payload) {
      try {
        // We don't know the embedding origin (the React app may run on
        // localhost in dev or any production hostname), and the payload
        // is just connection-state metadata — no sensitive data, no auth
        // tokens — so `*` is acceptable.
        window.parent.postMessage({ type: 'novnc:state', ...payload }, '*');
      } catch (_) { /* ignore — postMessage to a same-origin parent or
                       a parent that has navigated away should not crash
                       the viewer. */ }
    }

    function buildSocketUrl() {
      const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      // noVNC's websockify proxy path; matches Daytona's default and
      // vnc_lite.html's convention.
      const path = params.get('path') || 'websockify';
      return `${proto}//${window.location.host}/${path}`;
    }

    function tearDownRfb() {
      if (!rfb) return;
      try { rfb.disconnect(); } catch (_) { /* ignore */ }
      rfb = null;
    }

    function scheduleReconnect(reason) {
      tearDownRfb();
      if (attempt >= MAX_ATTEMPTS) {
        postState({ state: 'disconnected', reason });
        return;
      }
      const delayMs = Math.min(BASE_DELAY_MS * 2 ** attempt, MAX_DELAY_MS);
      postState({ state: 'reconnecting', attempt: attempt + 1, delayMs, reason });
      backoffTimer = setTimeout(connect, delayMs);
      attempt += 1;
    }

    function connect() {
      backoffTimer = null;
      postState({ state: 'connecting', attempt });

      try {
        rfb = new RFB(screenEl, buildSocketUrl(), {
          credentials: { password },
          shared: true,
        });
      } catch (err) {
        scheduleReconnect((err && err.message) || 'init_error');
        return;
      }

      rfb.viewOnly = viewOnly;
      rfb.resizeSession = resize === 'remote';
      rfb.scaleViewport = resize !== 'off';
      rfb.background = '#0b0b0d';

      rfb.addEventListener('connect', () => {
        attempt = 0;
        postState({ state: 'connected' });
      });
      rfb.addEventListener('disconnect', (event) => {
        const detail = event.detail || {};
        scheduleReconnect(detail.reason || (detail.clean ? 'closed' : 'lost'));
      });
      rfb.addEventListener('credentialsrequired', () => {
        // Auth failures won't be fixed by retrying; stop the loop.
        attempt = MAX_ATTEMPTS;
        postState({ state: 'auth_required' });
      });
      rfb.addEventListener('securityfailure', (event) => {
        attempt = MAX_ATTEMPTS;
        const detail = event.detail || {};
        postState({ state: 'security_failure', reason: detail.reason || 'unknown' });
      });
    }

    // Reset the reconnect budget if the user comes back to the panel after
    // a long idle — they expect a fresh attempt, not a stale "gave up".
    window.addEventListener('focus', () => {
      if (rfb && rfb._rfbConnectionState === 'connected') return;
      if (backoffTimer) { clearTimeout(backoffTimer); backoffTimer = null; }
      attempt = 0;
      connect();
    });

    connect();
  </script>
</body>
</html>
