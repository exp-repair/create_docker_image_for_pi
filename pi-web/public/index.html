<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pi Web Console</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <aside class="sidebar" aria-label="会话列表">
      <div class="brand">
        <div class="sigil">π</div>
        <div>
          <p class="eyebrow">Sandbox bridge</p>
          <h1>Pi Web Console</h1>
        </div>
      </div>
      <button id="newSession" class="primary-action" type="button">新建会话</button>
      <div class="search-wrap">
        <input id="sessionSearch" type="search" placeholder="搜索历史会话">
      </div>
      <div id="sessions" class="sessions" role="list"></div>
    </aside>

    <section class="stage" aria-label="Pi 对话窗口">
      <header class="topbar">
        <div>
          <p id="status" class="eyebrow">连接中</p>
          <h2 id="sessionTitle">当前会话</h2>
        </div>
        <div class="toolbar">
          <button id="openSettings" type="button">模型配置</button>
          <button id="renameSession" type="button">命名</button>
          <button id="abort" type="button">中止</button>
        </div>
      </header>

      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="composer" class="composer">
        <textarea id="prompt" rows="3" placeholder="输入要交给 Pi 的任务。Shift+Enter 换行，Enter 发送。"></textarea>
        <button type="submit">发送</button>
      </form>
    </section>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form id="modelConfigForm" class="settings-card">
      <div class="settings-head">
        <div>
          <p class="eyebrow">~/.pi/agent</p>
          <h3>模型配置</h3>
        </div>
        <button id="closeSettings" class="ghost" type="button">关闭</button>
      </div>

      <div class="split-title">settings.json</div>
      <div class="settings-grid">
        <label>默认 Provider
          <select id="defaultProvider" name="defaultProvider"></select>
        </label>
        <label>默认模型
          <input id="defaultModel" name="defaultModel" placeholder="glm-5.2">
        </label>
        <label>主题 theme
          <select id="theme" name="theme">
            <option value="light">light</option>
            <option value="dark">dark</option>
          </select>
        </label>
      </div>

      <div class="providers-head">
        <div class="split-title">models.json · providers</div>
        <button id="addProvider" class="ghost" type="button">添加 Provider</button>
      </div>
      <div id="providersList" class="providers-list"></div>

      <details class="areal-details">
        <summary>Areal bridge（可选）</summary>
        <div class="areal-fields">
          <label>Areal 地址
            <input id="arealBaseUrl" name="arealBaseUrl" placeholder="http://10.110.158.143:9100">
          </label>
          <label>Areal API 类型
            <input id="arealApi" name="arealApi" placeholder="openai-completions">
          </label>
          <label>Areal Key
            <input id="arealApiKey" name="arealApiKey" type="password" autocomplete="new-password" placeholder="留空则保持不变">
            <span id="arealKeyHint" class="hint"></span>
          </label>
          <label>Bridge User ID
            <input id="bridgeUserId" name="bridgeUserId" placeholder="X-Bridge-User-Id">
          </label>
          <label class="checkline">
            <input id="clearArealApiKey" name="clearArealApiKey" type="checkbox">
            清空 Areal Key
          </label>
        </div>
      </details>

      <p class="hint">
        自定义 Provider（如 zai-coding-cn）必须填写 API 类型和 models。智谱模型代码带连字符，例如 <code>glm-5.2</code> / <code>glm-4.6</code>。
        保存后会重启 Pi 并切换到默认 Provider/模型。
      </p>
      <div class="settings-actions">
        <button class="ghost" type="button" id="reloadConfig">重新读取</button>
        <button class="primary-action" type="submit">保存并重启 Pi</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
