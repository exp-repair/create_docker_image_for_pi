services:
  cube-leagent:
    build:
      context: .
      args:
        INSTALL_PI: ${INSTALL_PI:-1}
        TEAM_API_KEY: ${TEAM_API_KEY:-}
        TEAM_BASE_URL: ${TEAM_BASE_URL:-https://claude-code.club/openai/v1}
        TEAM_MODEL: ${TEAM_MODEL:-gpt-5.5}
        PI_SUITE_VERSION: ${PI_SUITE_VERSION:-0.1.17}
        PI_SUITE: ${PI_SUITE:-npm:@lebronj/pi-suite}
        PI_WORKSPACE_DIR: ${PI_WORKSPACE_DIR:-/workspace}
        PI_EVOLUTION_ENABLED: ${PI_EVOLUTION_ENABLED:-1}
    image: cube-leagent-template:local
    ports:
      - "${NOVNC_HOST_PORT:-6080}:6080"
      - "${VNC_HOST_PORT:-5901}:5901"
      - "${ENVD_HOST_PORT:-49983}:49983"
      - "${CODE_API_HOST_PORT:-49999}:49999"
    environment:
      DISPLAY: ":0"
      RESOLUTION: "${RESOLUTION:-1920x1080x24}"
      SCREEN_GEOM: "${SCREEN_GEOM:-1920x1080x24}"
      RESOLUTION_WIDTH: "${RESOLUTION_WIDTH:-1920}"
      RESOLUTION_HEIGHT: "${RESOLUTION_HEIGHT:-1080}"
      VNC_PORT: "5901"
      NOVNC_PORT: "6080"
      VNC_PASSWORD: "${VNC_PASSWORD:-}"
    shm_size: "2gb"
